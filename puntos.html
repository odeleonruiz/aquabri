<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mis Puntos — Aquabri</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1565c0,#42a5f5);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;overflow-x:hidden;}
.stars-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.star{position:absolute;opacity:0;animation:twinkle 3s infinite;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5);}50%{opacity:.6;transform:scale(1);}}
.card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.2);position:relative;z-index:1;}
.logo{text-align:center;margin-bottom:20px;}
#logo-img{width:80px;height:80px;border-radius:16px;object-fit:contain;margin:0 auto 6px;display:none;animation:logoIn .6s ease;}
@keyframes logoIn{from{transform:scale(0) rotate(-10deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.logo-fallback{font-size:52px;margin-bottom:4px;display:block;animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.logo h1{font-size:22px;font-weight:800;color:#1565c0;margin-top:8px;}
.logo p{font-size:12px;color:#9e9e9e;margin-top:2px;}
.search-box input{width:100%;border:2px solid #e0e0e0;border-radius:12px;padding:13px 16px;font-size:15px;outline:none;font-family:inherit;transition:.2s;}
.search-box input:focus{border-color:#1565c0;}
.search-box button{width:100%;margin-top:10px;background:linear-gradient(135deg,#1565c0,#42a5f5);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;position:relative;overflow:hidden;}
.search-box button:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(21,101,192,.4);}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.4);transform:scale(0);animation:rippleAnim .6s linear;}
@keyframes rippleAnim{to{transform:scale(4);opacity:0;}}
#resultado{margin-top:20px;display:none;}
.cli-nombre{font-size:20px;font-weight:800;color:#1a237e;text-align:center;margin-bottom:4px;animation:slideDown .5s ease;}
@keyframes slideDown{from{transform:translateY(-20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.cli-tel{font-size:12px;color:#9e9e9e;text-align:center;margin-bottom:16px;}
.puntos-box{background:linear-gradient(135deg,#1565c0,#42a5f5);border-radius:16px;padding:24px;text-align:center;color:#fff;margin-bottom:14px;position:relative;overflow:hidden;animation:cardIn .6s ease;}
@keyframes cardIn{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.puntos-box::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 60%);animation:shine 4s linear infinite;}
@keyframes shine{to{transform:rotate(360deg);}}
.puntos-num{font-size:64px;font-weight:900;line-height:1;text-shadow:0 2px 10px rgba(0,0,0,.2);}
.puntos-lbl{font-size:13px;opacity:.85;margin-top:6px;}
.estrellas-row{font-size:22px;margin-top:8px;animation:starsIn .8s ease .3s both;}
@keyframes starsIn{from{opacity:0;transform:scale(0);}to{opacity:1;transform:scale(1);}}
.prog-bar-wrap{background:rgba(255,255,255,.25);border-radius:20px;height:8px;margin-top:10px;overflow:hidden;}
.prog-bar{height:100%;border-radius:20px;background:#fff;transition:width 1.5s ease;}
.prog-lbl{font-size:10px;opacity:.8;margin-top:4px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat{background:#f5f7ff;border-radius:12px;padding:14px;text-align:center;animation:statIn .5s ease both;}
@keyframes statIn{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.stat:nth-child(1){animation-delay:.1s;}
.stat:nth-child(2){animation-delay:.2s;}
.stat-val{font-size:22px;font-weight:800;color:#1565c0;}
.stat-lbl{font-size:11px;color:#9e9e9e;margin-top:2px;}
.historial{border-top:1px solid #eee;padding-top:14px;}
.hist-title{font-size:12px;font-weight:700;color:#546e7a;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:12px;animation:fadeIn .3s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
.hist-desc{color:#37474f;flex:1;}
.hist-fecha{color:#9e9e9e;font-size:10px;margin-top:1px;}
.hist-pts.pos{font-weight:700;color:#2e7d32;}
.hist-pts.neg{font-weight:700;color:#c62828;}
.hist-pts.pend{font-weight:700;color:#e65100;}
.error{background:#ffebee;border-radius:10px;padding:14px;text-align:center;color:#c62828;font-size:13px;font-weight:600;margin-top:10px;display:none;animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.inscrito-badge{background:linear-gradient(135deg,#1565c0,#42a5f5);color:#fff;border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:8px;animation:badgeIn .5s ease;}
@keyframes badgeIn{from{transform:scale(0);}to{transform:scale(1);}}
.confeti-piece{position:fixed;width:8px;height:8px;top:-10px;pointer-events:none;z-index:999;}
</style>
</head>
<body>
<div class="stars-bg" id="stars-bg"></div>
<div id="confeti-wrap"></div>
<div class="card">
  <div class="logo">
    <img id="logo-img" src="" alt="">
    <span id="logo-fallback" class="logo-fallback">💧</span>
    <h1 id="empresa-nombre">Aquabri</h1>
    <p id="programa-nombre">Club de Puntos</p>
  </div>
  <div class="search-box">
    <input type="tel" id="telefono" placeholder="Ingresa tu número de teléfono" inputmode="tel" onkeydown="if(event.key==='Enter')buscarPuntos()">
    <button onclick="buscarPuntos()" id="btn-buscar">🔍 Ver mis puntos</button>
  </div>
  <div id="error-msg" class="error"></div>
  <div id="resultado">
    <div style="text-align:center;margin-bottom:12px">
      <span class="inscrito-badge" id="prog-badge">⭐ Miembro activo</span>
    </div>
    <div class="cli-nombre" id="cli-nombre"></div>
    <div class="cli-tel" id="cli-tel"></div>
    <div class="puntos-box">
      <div class="estrellas-row" id="estrellas-top">⭐</div>
      <div class="puntos-num" id="saldo-pts">0</div>
      <div class="puntos-lbl">puntos disponibles</div>
      <div class="prog-bar-wrap" id="prog-wrap" style="display:none">
        <div class="prog-bar" id="prog-bar" style="width:0%"></div>
      </div>
      <div class="prog-lbl" id="prog-lbl"></div>
    </div>
    <div class="grid">
      <div class="stat"><div class="stat-val" id="total-pts">0</div><div class="stat-lbl">Total acumulado</div></div>
      <div class="stat"><div class="stat-val" id="canjeados-pts">0</div><div class="stat-lbl">Canjeados</div></div>
    </div>
    <!-- Botón de canje -->
    <div id="canje-qr-section" style="margin-bottom:14px;display:none">
      <button onclick="generarQRCanje()" id="btn-generar-qr"
        style="width:100%;background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
        🎁 Generar QR para canjear puntos
      </button>
      <div id="qr-canje-display" style="margin-top:12px;text-align:center;display:none">
        <div style="background:#fff;border:2px solid #a5d6a7;border-radius:12px;padding:16px;display:inline-block">
          <div style="font-size:12px;font-weight:700;color:#2e7d32;margin-bottom:8px">📱 Muestra este QR al vendedor</div>
          <img id="qr-canje-img" src="" style="width:180px;height:180px">
          <div id="qr-expira" style="font-size:11px;color:#e65100;margin-top:6px;font-weight:600"></div>
          <div style="font-size:10px;color:#9e9e9e;margin-top:4px">Válido por 5 minutos</div>
        </div>
      </div>
    </div>
    <div class="historial">
      <div class="hist-title">📋 Últimas transacciones</div>
      <div id="hist-lista"></div>
    </div>
  </div>
</div>

<script>
const SURL='https://odwccqqvxpsggggehjtt.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kd2NjcXF2eHBzZ2dnZ2VoanR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODQxNTgsImV4cCI6MjA5MDE2MDE1OH0.4RulBc7xRiqfy5mAK9yxpj49fr7OloTp0-wZ9pZ0LJA';
const sb=supabase.createClient(SURL,SKEY);

function crearEstrellas(){
  const c=document.getElementById('stars-bg');
  for(let i=0;i<18;i++){
    const s=document.createElement('div');
    s.className='star';
    s.textContent=['⭐','✨','🌟'][Math.floor(Math.random()*3)];
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;font-size:${10+Math.random()*16}px;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;
    c.appendChild(s);
  }
}

function lanzarConfeti(){
  const wrap=document.getElementById('confeti-wrap');
  wrap.innerHTML='';
  const colors=['#1565c0','#42a5f5','#ffd700','#ff6b6b','#51cf66','#ff9f43','#a29bfe','#fd79a8'];
  for(let i=0;i<70;i++){
    const p=document.createElement('div');
    p.className='confeti-piece';
    const x=Math.random()*100;
    p.style.cssText=`left:${x}%;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};transform:rotate(${Math.random()*360}deg)`;
    wrap.appendChild(p);
    const dur=1.5+Math.random()*2;
    const delay=Math.random()*1;
    setTimeout(()=>{
      p.style.transition=`all ${dur}s ease-out`;
      p.style.top=(70+Math.random()*30)+'vh';
      p.style.left=(x+(-20+Math.random()*40))+'%';
      p.style.opacity='0';
      p.style.transform=`rotate(${Math.random()*720}deg) scale(0.3)`;
    },delay*1000);
    setTimeout(()=>p.remove(),(dur+delay)*1000+300);
  }
}

function contarHasta(el,hasta,dur=1400){
  const start=Date.now();
  const es_dec=hasta%1!==0;
  function step(){
    const p=Math.min((Date.now()-start)/dur,1);
    const ease=1-Math.pow(1-p,3);
    const v=hasta*ease;
    el.textContent=es_dec?v.toFixed(2):Math.round(v);
    if(p<1)requestAnimationFrame(step);
    else el.textContent=es_dec?hasta.toFixed(2):hasta;
  }
  requestAnimationFrame(step);
}

document.getElementById('btn-buscar').addEventListener('click',function(e){
  const r=document.createElement('span');
  r.className='ripple';
  const rect=this.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height);
  r.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  this.appendChild(r);
  setTimeout(()=>r.remove(),700);
});

async function loadConfig(){
  try{
    const{data:cfg}=await sb.from('config').select('nombre,logo').single();
    if(cfg){
      document.getElementById('empresa-nombre').textContent=cfg.nombre||'Aquabri';
      document.title='Mis Puntos — '+(cfg.nombre||'Aquabri');
      if(cfg.logo){
        const img=document.getElementById('logo-img');
        img.src=cfg.logo;
        img.style.display='block';
        document.getElementById('logo-fallback').style.display='none';
      }
    }
    const{data:pts}=await sb.from('puntos_config').select('nombre_programa').single();
    if(pts?.nombre_programa){
      document.getElementById('programa-nombre').textContent=pts.nombre_programa;
      document.getElementById('prog-badge').textContent='⭐ '+pts.nombre_programa;
    }
  }catch(e){}
  const params=new URLSearchParams(window.location.search);
  const tel=params.get('tel');
  if(tel){document.getElementById('telefono').value=tel;buscarPuntos();}
}

async function buscarPuntos(){
  const tel=document.getElementById('telefono').value.trim().replace(/\s/g,'');
  const errorEl=document.getElementById('error-msg');
  const resEl=document.getElementById('resultado');
  errorEl.style.display='none';
  resEl.style.display='none';
  if(!tel){errorEl.textContent='Ingresa tu número de teléfono';errorEl.style.display='block';return;}
  const btn=document.getElementById('btn-buscar');
  btn.textContent='⏳ Buscando...';btn.disabled=true;
  try{
    const{data:clientes}=await sb.from('clientes').select('id,nombre,telefono').ilike('telefono','%'+tel+'%');
    btn.textContent='🔍 Ver mis puntos';btn.disabled=false;
    if(!clientes?.length){
      errorEl.textContent='No encontramos ese número. Consulta con tu vendedor.';
      errorEl.style.display='block';return;
    }
    const cli=clientes[0];
    const{data:ptos}=await sb.from('puntos_clientes').select('*').eq('cliente_id',cli.id).single();
    if(!ptos||!ptos.activo){
      errorEl.textContent='Este número no está inscrito en el programa de puntos.';
      errorEl.style.display='block';return;
    }
    const{data:hist}=await sb.from('puntos_historial').select('*').eq('cliente_id',cli.id).order('id',{ascending:false}).limit(10);
    const saldo=parseFloat(ptos.puntos_totales||0)-parseFloat(ptos.puntos_canjeados||0);
    const total=parseFloat(ptos.puntos_totales||0);
    const canj=parseFloat(ptos.puntos_canjeados||0);
    document.getElementById('cli-nombre').textContent=cli.nombre;
    document.getElementById('cli-tel').textContent='📞 '+cli.telefono;
    // Estrellas según puntos
    const estEl=document.getElementById('estrellas-top');
    estEl.textContent=saldo>=100?'⭐⭐⭐⭐⭐':saldo>=50?'⭐⭐⭐⭐':saldo>=20?'⭐⭐⭐':saldo>=10?'⭐⭐':'⭐';
    resEl.style.display='block';
    setTimeout(()=>{
      contarHasta(document.getElementById('saldo-pts'),saldo);
      contarHasta(document.getElementById('total-pts'),total);
      contarHasta(document.getElementById('canjeados-pts'),canj);
    },400);
    // Historial animado
    const histEl=document.getElementById('hist-lista');
    if(hist?.length){
      histEl.innerHTML=hist.map((h,i)=>{
        const pts=parseFloat(h.puntos||0);
        const pend=h.tipo==='pendiente';
        const pos=pts>0&&!pend;
        let fecha='';
        try{fecha=new Date(h.created_at).toLocaleDateString('es-GT',{day:'2-digit',month:'short',year:'2-digit'});}catch(e){}
        const ic={acumulacion:'⭐',canje:'🎁',ajuste:'✏️',inscripcion:'🏅',pendiente:'⏳'}[h.tipo]||'📝';
        return`<div class="hist-item" style="animation-delay:${i*0.07}s"><div><div class="hist-desc">${ic} ${h.descripcion||h.tipo}</div>${pend?'<div class="hist-fecha" style="color:#e65100;font-weight:600">Pendiente de pago</div>':''}${fecha?`<div class="hist-fecha">${fecha}</div>`:''}</div><div class="hist-pts ${pos?'pos':pend?'pend':'neg'}">${pend?'⏳ ':''}${pos?'+':''}${pts%1===0?pts:pts.toFixed(2)} pts</div></div>`;
      }).join('');
    } else {
      histEl.innerHTML='<div style="text-align:center;padding:20px;color:#9e9e9e;font-size:12px">⭐<br>Aún no tienes movimientos.<br>¡Sigue comprando para acumular!</div>';
    }
    if(saldo>0)setTimeout(lanzarConfeti,600);
    // Mostrar botón de canje solo si tiene puntos suficientes para al menos 1 producto
    _canjeCliId=cli.id;
    // Verificar si el saldo alcanza algún producto (cada punto = Q1)
    // No tenemos lista de productos aquí, así que mostramos si saldo >= 1
    const canjeSection=document.getElementById('canje-qr-section');
    if(canjeSection)canjeSection.style.display=saldo>=1?'':'none';
  }catch(e){
    btn.textContent='🔍 Ver mis puntos';btn.disabled=false;
    errorEl.textContent='Error de conexión. Intenta de nuevo.';
    errorEl.style.display='block';
  }
}

crearEstrellas();
loadConfig();

let _canjeCliId=null;
let _canjeTimer=null;

async function generarQRCanje(){
  if(!_canjeCliId){showNotifPuntos('Error: cliente no identificado');return;}
  const btn=document.getElementById('btn-generar-qr');
  btn.textContent='⏳ Generando...';btn.disabled=true;
  // Generar código único
  const codigo='CANJE-'+_canjeCliId+'-'+Date.now()+'-'+Math.random().toString(36).substr(2,6).toUpperCase();
  const expira=new Date(Date.now()+5*60*1000).toISOString();
  // Guardar en BD
  const SURL2='https://odwccqqvxpsggggehjtt.supabase.co';
  const SKEY2='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kd2NjcXF2eHBzZ2dnZ2VoanR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODQxNTgsImV4cCI6MjA5MDE2MDE1OH0.4RulBc7xRiqfy5mAK9yxpj49fr7OloTp0-wZ9pZ0LJA';
  const resp=await fetch(SURL2+'/rest/v1/puntos_canjes_qr',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SKEY2,'Authorization':'Bearer '+SKEY2,'Prefer':'return=minimal'},
    body:JSON.stringify({cliente_id:_canjeCliId,codigo,expira_at:expira,usado:false})
  });
  btn.textContent='🎁 Generar QR para canjear puntos';btn.disabled=false;
  if(!resp.ok){showNotifPuntos('Error al generar QR');return;}
  // Mostrar QR
  const qrUrl='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(codigo);
  document.getElementById('qr-canje-img').src=qrUrl;
  document.getElementById('qr-canje-display').style.display='';
  // Contador regresivo
  clearInterval(_canjeTimer);
  let segs=300;
  const exp=document.getElementById('qr-expira');
  _canjeTimer=setInterval(()=>{
    segs--;
    const m=Math.floor(segs/60),s=segs%60;
    if(exp)exp.textContent='Expira en: '+m+':'+(s<10?'0':'')+s;
    if(segs<=0){
      clearInterval(_canjeTimer);
      if(exp)exp.textContent='⚠️ QR expirado — genera uno nuevo';
      document.getElementById('qr-canje-display').style.display='none';
    }
  },1000);
}

function showNotifPuntos(msg){
  const n=document.createElement('div');
  n.textContent=msg;
  n.style.cssText='position:fixed;top:20px;right:16px;background:#c62828;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999';
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),3000);
}
</script>
</body>
</html>
