<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mis Puntos — Aquabri</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1565c0,#42a5f5);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.2);}
.logo{text-align:center;margin-bottom:20px;}
.logo h1{font-size:22px;font-weight:800;color:#1565c0;margin-top:8px;}
.logo p{font-size:12px;color:#9e9e9e;margin-top:2px;}
.search-box input{width:100%;border:2px solid #e0e0e0;border-radius:12px;padding:13px 16px;font-size:15px;outline:none;font-family:inherit;transition:.2s;}
.search-box input:focus{border-color:#1565c0;}
.search-box button{width:100%;margin-top:10px;background:#1565c0;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;}
.search-box button:hover{background:#1976d2;}
#resultado{margin-top:20px;display:none;}
.cli-nombre{font-size:20px;font-weight:800;color:#1a237e;text-align:center;margin-bottom:4px;}
.cli-tel{font-size:12px;color:#9e9e9e;text-align:center;margin-bottom:16px;}
.puntos-box{background:linear-gradient(135deg,#1565c0,#42a5f5);border-radius:16px;padding:20px;text-align:center;color:#fff;margin-bottom:14px;}
.puntos-num{font-size:52px;font-weight:900;line-height:1;}
.puntos-lbl{font-size:13px;opacity:.85;margin-top:4px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat{background:#f5f7ff;border-radius:12px;padding:14px;text-align:center;}
.stat-val{font-size:22px;font-weight:800;color:#1565c0;}
.stat-lbl{font-size:11px;color:#9e9e9e;margin-top:2px;}
.historial{border-top:1px solid #eee;padding-top:14px;}
.hist-title{font-size:12px;font-weight:700;color:#546e7a;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:12px;}
.hist-desc{color:#37474f;flex:1;}
.hist-fecha{color:#9e9e9e;font-size:10px;margin-top:1px;}
.hist-pts{font-weight:700;}
.hist-pts.pos{color:#2e7d32;}
.hist-pts.neg{color:#c62828;}
.error{background:#ffebee;border-radius:10px;padding:14px;text-align:center;color:#c62828;font-size:13px;font-weight:600;margin-top:10px;display:none;}
.inscrito-badge{background:#e8f5e9;color:#2e7d32;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:12px;}
.prog-nombre{text-align:center;font-size:13px;color:#1565c0;font-weight:600;margin-bottom:10px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img id="logo-img" src="" alt="" style="display:none;width:80px;height:80px;border-radius:16px;object-fit:contain;margin:0 auto 6px;display:none">
    <div id="logo-fallback" style="font-size:52px;margin-bottom:4px">💧</div>
    <h1 id="empresa-nombre">Aquabri</h1>
    <p id="programa-nombre">Club de Puntos</p>
  </div>

  <div class="search-box">
    <input type="tel" id="telefono" placeholder="Ingresa tu número de teléfono" 
      inputmode="tel" onkeydown="if(event.key==='Enter')buscarPuntos()">
    <button onclick="buscarPuntos()">🔍 Ver mis puntos</button>
  </div>

  <div id="error-msg" class="error"></div>

  <div id="resultado">
    <div class="cli-nombre" id="cli-nombre"></div>
    <div class="cli-tel" id="cli-tel"></div>
    <div style="text-align:center"><span class="inscrito-badge" id="prog-badge">⭐ Miembro activo</span></div>
    <div class="prog-nombre" id="prog-nombre2"></div>

    <div class="puntos-box">
      <div class="puntos-num" id="saldo-pts">0</div>
      <div class="puntos-lbl">puntos disponibles</div>
    </div>

    <div class="grid">
      <div class="stat">
        <div class="stat-val" id="total-pts">0</div>
        <div class="stat-lbl">Total acumulado</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="canjeados-pts">0</div>
        <div class="stat-lbl">Canjeados</div>
      </div>
    </div>

    <div class="historial">
      <div class="hist-title">📋 Últimas transacciones</div>
      <div id="hist-lista"></div>
    </div>
  </div>
</div>

<script>
const SURL='https://odwccqqvxpsggggehjtt.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kd2NjcXF2eHBzZ2dnZ2VoanR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODQxNTgsImV4cCI6MjA5MDE2MDE1OH0.4RulBc7xRiqfy5mAK9yxpj49fr7OloTp0-wZ9pZ0LJA';
const sb=supabase.createClient(SURL,SKEY);

// Cargar config
async function loadConfig(){
  const{data:cfg}=await sb.from('config').select('nombre,slogan,logo').single();
  if(cfg){
    document.getElementById('empresa-nombre').textContent=cfg.nombre||'Aquabri';
    document.title='Mis Puntos — '+(cfg.nombre||'Aquabri');
    if(cfg.logo){
      const img=document.getElementById('logo-img');
      const fb=document.getElementById('logo-fallback');
      img.src=cfg.logo;
      img.style.display='block';
      if(fb)fb.style.display='none';
    }
  }
  const{data:pts}=await sb.from('puntos_config').select('nombre_programa').single();
  if(pts){
    document.getElementById('programa-nombre').textContent=pts.nombre_programa||'Club de Puntos';
    document.getElementById('prog-nombre2').textContent='⭐ '+( pts.nombre_programa||'Club de Puntos');
    document.getElementById('prog-badge').textContent='⭐ '+( pts.nombre_programa||'Club');
  }
  // Si viene con ?tel= en la URL, buscar automáticamente
  const params=new URLSearchParams(window.location.search);
  const telParam=params.get('tel');
  if(telParam){
    document.getElementById('telefono').value=telParam;
    buscarPuntos();
  }
}

async function buscarPuntos(){
  const tel=document.getElementById('telefono').value.trim().replace(/\s/g,'');
  const errorEl=document.getElementById('error-msg');
  const resEl=document.getElementById('resultado');
  errorEl.style.display='none';
  resEl.style.display='none';
  if(!tel){errorEl.textContent='Ingresa tu número de teléfono';errorEl.style.display='block';return;}

  // Buscar cliente por teléfono
  const{data:clientes}=await sb.from('clientes').select('id,nombre,telefono').ilike('telefono','%'+tel+'%');
  if(!clientes?.length){
    errorEl.textContent='No encontramos ningún cliente con ese número. Consulta con tu vendedor.';
    errorEl.style.display='block';
    return;
  }
  const cli=clientes[0];

  // Verificar si está inscrito en puntos
  const{data:ptos}=await sb.from('puntos_clientes').select('*').eq('cliente_id',cli.id).single();
  if(!ptos||!ptos.activo){
    errorEl.textContent='Este número no está inscrito en el programa de puntos. Consulta con tu vendedor para inscribirte.';
    errorEl.style.display='block';
    return;
  }

  // Cargar historial
  let historial=null;
  const{data:h1}=await sb.from('puntos_historial')
    .select('*').eq('cliente_id',cli.id)
    .order('id',{ascending:false}).limit(15);
  historial=h1;

  const saldo=parseFloat(ptos.puntos_totales||0)-parseFloat(ptos.puntos_canjeados||0);

  document.getElementById('cli-nombre').textContent=cli.nombre;
  document.getElementById('cli-tel').textContent='📞 '+cli.telefono;
  document.getElementById('saldo-pts').textContent=saldo%1===0?saldo:saldo.toFixed(2);
  document.getElementById('total-pts').textContent=parseFloat(ptos.puntos_totales||0)%1===0?parseFloat(ptos.puntos_totales||0):parseFloat(ptos.puntos_totales||0).toFixed(2);
  document.getElementById('canjeados-pts').textContent=parseFloat(ptos.puntos_canjeados||0)%1===0?parseFloat(ptos.puntos_canjeados||0):parseFloat(ptos.puntos_canjeados||0).toFixed(2);

  const histEl=document.getElementById('hist-lista');
  if(historial?.length){
    histEl.innerHTML=historial.map(h=>{
      const pts=parseFloat(h.puntos||0);
      const esPendiente=h.tipo==='pendiente';
      const esPos=pts>0&&!esPendiente;
      let fecha='';
      try{fecha=new Date(h.created_at).toLocaleDateString('es-GT',{day:'2-digit',month:'short',year:'2-digit'});}catch(e){}
      const iconos={acumulacion:'⭐',canje:'🎁',ajuste:'✏️',inscripcion:'🏅',pendiente:'⏳'};
      const ic=iconos[h.tipo]||'📝';
      return`<div class="hist-item" style="${esPendiente?'opacity:.6':''}">
        <div>
          <div class="hist-desc">${ic} ${h.descripcion||h.tipo}</div>
          ${esPendiente?'<div class="hist-fecha" style="color:#e65100;font-weight:600">Pendiente de pago</div>':''}
          ${fecha?`<div class="hist-fecha">${fecha}</div>`:''}
        </div>
        <div class="hist-pts ${esPos?'pos':esPendiente?'':'neg'}" style="${esPendiente?'color:#e65100':''}">
          ${esPendiente?'⏳ ':''}${esPos?'+':''}${pts%1===0?pts:pts.toFixed(2)} pts
        </div>
      </div>`;
    }).join('');
  } else {
    histEl.innerHTML='<div style="text-align:center;padding:20px"><div style="font-size:32px">⭐</div><p style="color:#9e9e9e;font-size:12px;margin-top:8px">Aún no tienes movimientos registrados.<br>¡Sigue comprando para acumular!</p></div>';
  }

  resEl.style.display='block';
}

loadConfig();
</script>
</body>
</html>
